workflows:
  android-workflow:
    name: Build APK
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
