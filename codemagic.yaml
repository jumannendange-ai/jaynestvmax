workflows:

  android-release:
    name: JAYNES MAX TV — Release APK
    max_build_duration: 45
    instance_type: mac_mini_m1

    environment:
      android_signing:
        - jaynes_keystore
      vars:
        PACKAGE_NAME: "com.jaynestv.max"
      java: 17

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease \
            -PstoreFile="$CM_KEYSTORE_PATH" \
            -PstorePassword="$CM_KEYSTORE_PASSWORD" \
            -PkeyAlias="$CM_KEY_ALIAS" \
            -PkeyPassword="$CM_KEY_PASSWORD"

    artifacts:
      - app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - jaynestvmax@gmail.com
        notify:
          success: true
          failure: true

  android-debug:
    name: JAYNES MAX TV — Debug APK
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true

    scripts:
      - name: Set local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - jaynestvmax@gmail.com
        notify:
          success: true
          failure: false
